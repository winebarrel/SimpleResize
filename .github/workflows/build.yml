name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild -project SimpleResize.xcodeproj \
            -scheme SimpleResize \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -quiet \
            build
